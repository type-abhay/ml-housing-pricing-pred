<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>California Housing Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2>Housing Price Predictor</h2>
        <p class="subtitle">Enter the district demographics to estimate the median value.</p>
        
        <form action="{{ url_for('predict') }}" method="post">
            <div class="form-grid">
                <input type="number" step="any" name="MedInc" placeholder="Median Income" required="required" value="{{ inputs.get('MedInc', '') }}" />
                <input type="number" step="any" name="HouseAge" placeholder="House Age" required="required" value="{{ inputs.get('HouseAge', '') }}" />
                <input type="number" step="any" name="AveRooms" placeholder="Average Rooms" required="required" value="{{ inputs.get('AveRooms', '') }}" />
                <input type="number" step="any" name="AveBedrms" placeholder="Average Bedrooms" required="required" value="{{ inputs.get('AveBedrms', '') }}" />
                <input type="number" step="any" name="Population" placeholder="Population" required="required" value="{{ inputs.get('Population', '') }}" />
                <input type="number" step="any" name="AveOccup" placeholder="Average Occupancy" required="required" value="{{ inputs.get('AveOccup', '') }}" />
                <input type="number" step="any" name="Latitude" placeholder="Latitude" required="required" value="{{ inputs.get('Latitude', '') }}" />
                <input type="number" step="any" name="Longitude" placeholder="Longitude" required="required" value="{{ inputs.get('Longitude', '') }}" />
            </div>
            <button type="submit">Predict Value</button>
        </form>

        {% if prediction_text %}
        <div class="result">
            <h3>{{ prediction_text }}</h3>
        </div>
        {% endif %}
    </div>
</body>
</html>
